<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify 2FA</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>2FA Verification</h1>
      <p>Open your authenticator app and enter the current 6-digit code.</p>
      <form id="verify-form">
        <label for="code">2FA Code</label>
        <input id="code" required pattern="[0-9]{6}" maxlength="6" />
        <button type="submit">Verify and Login</button>
      </form>
      <div id="status"></div>
      <p><a href="/login">Back to Login</a></p>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/verify_2fa.js"></script>
  </body>
</html>
